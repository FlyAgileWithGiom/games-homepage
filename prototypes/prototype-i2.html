<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly Agile Games</title>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Silkscreen', cursive;
    background: #1a1a3e;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    image-rendering: pixelated;
  }

  /* --- SCENE --- */
  .scene {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* --- SKY --- */
  .sky {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 65%;
    background: linear-gradient(180deg, #1a1a3e 0%, #2d1b69 60%, #3a2578 100%);
    z-index: 0;
  }

  .star {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    animation: twinkle var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.8; }
  }

  /* --- MOON --- */
  .moon {
    position: absolute;
    top: 60px;
    right: 12%;
    width: 20px;
    height: 20px;
    z-index: 2;
  }
  .moon-body {
    width: 20px;
    height: 20px;
    background: #f0e68c;
    border-radius: 50%;
    box-shadow:
      0 0 8px 2px rgba(240, 230, 140, 0.4),
      0 0 20px 4px rgba(240, 230, 140, 0.15);
    position: relative;
  }
  .moon-crater {
    position: absolute;
    background: rgba(0,0,0,0.1);
    border-radius: 50%;
  }
  .moon-crater:nth-child(1) { width: 4px; height: 4px; top: 4px; left: 6px; }
  .moon-crater:nth-child(2) { width: 3px; height: 3px; top: 10px; left: 12px; }
  .moon-crater:nth-child(3) { width: 5px; height: 5px; top: 8px; left: 4px; }

  /* --- CLOUDS --- */
  .cloud {
    position: absolute;
    z-index: 1;
    opacity: 0.08;
  }
  .cloud-1 {
    top: 80px;
    animation: drift1 90s linear infinite;
  }
  .cloud-2 {
    top: 140px;
    animation: drift2 100s linear infinite;
    animation-delay: -40s;
  }
  .cloud-pixel {
    position: absolute;
    background: #c0c0d0;
    width: 8px;
    height: 8px;
  }

  @keyframes drift1 {
    0% { transform: translateX(-200px); }
    100% { transform: translateX(calc(100vw + 200px)); }
  }
  @keyframes drift2 {
    0% { transform: translateX(calc(100vw + 200px)); }
    100% { transform: translateX(-200px); }
  }

  /* --- HEADER --- */
  .header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 40px 20px 10px;
  }
  .header h1 {
    color: #fff;
    font-size: 2.5rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,255,255,0.2), 0 2px 0 rgba(0,0,0,0.3);
  }
  .header .subtitle {
    color: #4CAF50;
    font-size: 0.85rem;
    font-weight: 400;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .header .invitation-note {
    color: rgba(255,255,255,0.5);
    font-size: 0.55rem;
    font-weight: 400;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  /* --- GROUND --- */
  .ground {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40%;
    z-index: 0;
  }
  .ground-grass {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 100%;
    background: linear-gradient(180deg, #2d7a32 0%, #1e5c24 40%, #164a1b 100%);
  }
  .ground-texture {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(circle, rgba(60,130,60,0.3) 1px, transparent 1px),
      radial-gradient(circle, rgba(40,100,40,0.2) 1px, transparent 1px);
    background-size: 16px 16px, 24px 24px;
    background-position: 0 0, 8px 8px;
  }
  .ground-path {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 30%;
    background: linear-gradient(180deg, transparent 0%, rgba(139,119,80,0.3) 40%, rgba(139,119,80,0.4) 100%);
    border-radius: 50% 50% 0 0;
  }

  /* --- VILLAGE --- */
  .village {
    position: relative;
    z-index: 5;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 60px;
    padding: 0 40px;
    margin-top: auto;
    padding-bottom: 60px;
  }

  /* --- BUILDING SLOT --- */
  .building-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.3s ease;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .building-slot:hover {
    transform: translateY(-4px);
  }
  .building-slot.disabled {
    opacity: 0.75;
    cursor: default;
  }
  .building-slot.disabled:hover {
    transform: none;
  }

  /* --- SIGNPOST --- */
  .signpost {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: 12px;
  }
  .signpost-pole {
    width: 8px;
    height: 24px;
    background: linear-gradient(90deg, #8B6914, #A0792C, #8B6914);
  }
  .signpost-plank {
    background: linear-gradient(180deg, #a0792c, #8B6914);
    border: 2px solid #6B4E0A;
    padding: 8px 16px;
    text-align: center;
    min-width: 160px;
    position: relative;
  }
  .signpost-plank::before,
  .signpost-plank::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 8px;
    background: linear-gradient(180deg, #8B6914, #6B4E0A);
  }
  .signpost-plank::before { left: -10px; clip-path: polygon(100% 0, 100% 100%, 0 50%); }
  .signpost-plank::after { right: -10px; clip-path: polygon(0 0, 100% 50%, 0 100%); }

  .signpost-name {
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .signpost-desc {
    color: rgba(255,255,255,0.5);
    font-size: 0.5rem;
    font-weight: 400;
    margin-top: 2px;
  }
  .signpost-status {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 0.45rem;
    font-weight: 400;
  }
  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }
  .status-dot.live { background: #4CAF50; box-shadow: 0 0 4px #4CAF50; }
  .status-dot.soon { background: #888; }
  .status-text.live { color: #4CAF50; }
  .status-text.soon { color: #888; }

  /* ======================== */
  /* BUILDING: CHAMBRE FROIDE */
  /* ======================== */
  .building-cf {
    width: 160px;
    height: 200px;
    position: relative;
  }
  /* Roof */
  .cf-roof {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 88px solid transparent;
    border-right: 88px solid transparent;
    border-bottom: 60px solid #5a6a7a;
    z-index: 2;
  }
  .cf-snow {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 50px solid rgba(220,235,245,0.7);
    z-index: 3;
  }
  /* Icicles */
  .cf-icicles {
    position: absolute;
    top: 58px;
    left: 4px;
    right: 4px;
    height: 20px;
    z-index: 4;
    display: flex;
    justify-content: space-around;
    padding: 0 10px;
  }
  .icicle {
    width: 4px;
    background: linear-gradient(180deg, rgba(180,220,240,0.9), rgba(180,220,240,0.2));
    border-radius: 0 0 2px 2px;
  }
  .icicle:nth-child(1) { height: 12px; }
  .icicle:nth-child(2) { height: 8px; }
  .icicle:nth-child(3) { height: 14px; }
  .icicle:nth-child(4) { height: 10px; }
  .icicle:nth-child(5) { height: 16px; }
  .icicle:nth-child(6) { height: 9px; }

  /* Walls */
  .cf-walls {
    position: absolute;
    top: 56px;
    left: 8px;
    right: 8px;
    bottom: 0;
    background: linear-gradient(135deg, #6a7a8a 0%, #5a6a7a 50%, #4a5a6a 100%);
    border: 2px solid #3a4a5a;
    z-index: 1;
  }
  .cf-frost {
    position: absolute;
    background: rgba(180,220,240,0.15);
    border-radius: 2px;
  }
  .cf-frost:nth-child(1) { width: 20px; height: 12px; top: 20px; left: 8px; }
  .cf-frost:nth-child(2) { width: 16px; height: 8px; top: 60px; right: 12px; }
  .cf-frost:nth-child(3) { width: 12px; height: 16px; bottom: 30px; left: 20px; }

  /* Windows */
  .cf-window {
    position: absolute;
    width: 16px;
    height: 16px;
    background: #1a3a4a;
    border: 2px solid #3a4a5a;
    box-shadow: 0 0 6px rgba(100,200,220,0.5), inset 0 0 4px rgba(100,200,220,0.3);
    z-index: 2;
  }
  .cf-window-l { top: 30px; left: 16px; }
  .cf-window-r { top: 30px; right: 16px; }

  /* Door */
  .cf-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 36px;
    background: #3a4a5a;
    border: 2px solid #2a3a4a;
    border-bottom: none;
    z-index: 2;
    transition: box-shadow 0.3s ease;
  }
  .building-slot:hover .cf-door {
    box-shadow: 0 0 10px rgba(100,200,220,0.6);
  }

  /* Snowflake sprite - centered in building wall */
  .cf-sprite {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    background: transparent;
    z-index: 5;
    filter: drop-shadow(0 0 6px rgba(180,220,240,0.6));
    box-shadow:
      /* Vertical line */
       0px -20px 0 0 #b0e8f0,
       0px -16px 0 0 #d0f4ff,
       0px -12px 0 0 #d0f4ff,
       0px -8px 0 0 #d0f4ff,
       0px -4px 0 0 #fff,
       0px  0px 0 0 #fff,
       0px  4px 0 0 #fff,
       0px  8px 0 0 #d0f4ff,
       0px 12px 0 0 #d0f4ff,
       0px 16px 0 0 #d0f4ff,
       0px 20px 0 0 #b0e8f0,
      /* Horizontal line */
      -20px 0px 0 0 #b0e8f0,
      -16px 0px 0 0 #d0f4ff,
      -12px 0px 0 0 #d0f4ff,
       -8px 0px 0 0 #d0f4ff,
       -4px 0px 0 0 #fff,
        4px 0px 0 0 #fff,
        8px 0px 0 0 #d0f4ff,
       12px 0px 0 0 #d0f4ff,
       16px 0px 0 0 #d0f4ff,
       20px 0px 0 0 #b0e8f0,
      /* Diagonal TL-BR */
      -16px -16px 0 0 #b0e8f0,
      -12px -12px 0 0 #d0f4ff,
       -8px  -8px 0 0 #d0f4ff,
        8px   8px 0 0 #d0f4ff,
       12px  12px 0 0 #d0f4ff,
       16px  16px 0 0 #b0e8f0,
      /* Diagonal TR-BL */
       16px -16px 0 0 #b0e8f0,
       12px -12px 0 0 #d0f4ff,
        8px  -8px 0 0 #d0f4ff,
       -8px   8px 0 0 #d0f4ff,
      -12px  12px 0 0 #d0f4ff,
      -16px  16px 0 0 #b0e8f0,
      /* Branch tips */
      -20px -4px 0 0 #90d8e0,
      -20px  4px 0 0 #90d8e0,
       20px -4px 0 0 #90d8e0,
       20px  4px 0 0 #90d8e0,
       -4px -20px 0 0 #90d8e0,
        4px -20px 0 0 #90d8e0,
       -4px  20px 0 0 #90d8e0,
        4px  20px 0 0 #90d8e0;
  }
  /* Glow background behind CF sprite */
  .cf-sprite-glow {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: 56px;
    height: 56px;
    background: radial-gradient(circle, rgba(180,220,240,0.15) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 4;
  }

  /* ===================== */
  /* BUILDING: HOTPLATE    */
  /* ===================== */
  .building-hp {
    width: 180px;
    height: 210px;
    position: relative;
  }
  /* Roof */
  .hp-roof {
    position: absolute;
    top: 0;
    left: -8px;
    right: -8px;
    height: 20px;
    background: linear-gradient(180deg, #5a3a1a, #4a2a10);
    border: 2px solid #3a1a00;
    z-index: 2;
  }
  .hp-roof::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0;
    right: 0;
    height: 4px;
    background: repeating-linear-gradient(90deg, #3a1a00 0px, #3a1a00 2px, transparent 2px, transparent 4px);
  }

  /* Chimney */
  .hp-chimney {
    position: absolute;
    top: -28px;
    right: 24px;
    width: 20px;
    height: 32px;
    background: linear-gradient(90deg, #6a4a2a, #5a3a1a);
    border: 2px solid #3a1a00;
    z-index: 3;
  }
  .hp-chimney-cap {
    position: absolute;
    top: -4px;
    left: -2px;
    right: -2px;
    height: 6px;
    background: #4a2a10;
    border: 2px solid #3a1a00;
  }

  /* Smoke */
  .smoke-particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(180,180,190,0.5);
    border-radius: 50%;
    z-index: 4;
  }
  .smoke-particle:nth-child(1) {
    left: 6px;
    animation: smoke 7s ease-out infinite;
  }
  .smoke-particle:nth-child(2) {
    left: 10px;
    animation: smoke 7s ease-out infinite 2.3s;
  }
  .smoke-particle:nth-child(3) {
    left: 3px;
    animation: smoke 8s ease-out infinite 4.5s;
    width: 8px;
    height: 8px;
  }

  @keyframes smoke {
    0% { bottom: 100%; opacity: 0.5; transform: translateX(0) scale(1); }
    50% { opacity: 0.3; transform: translateX(-6px) scale(1.3); }
    100% { bottom: calc(100% + 50px); opacity: 0; transform: translateX(-12px) scale(1.8); }
  }

  /* Walls */
  .hp-walls {
    position: absolute;
    top: 18px;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(135deg, #8B6914 0%, #7a5a10 50%, #6a4a0c 100%);
    border: 2px solid #5a3a08;
    z-index: 1;
  }
  /* Wood grain */
  .hp-walls::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 18px,
      rgba(0,0,0,0.08) 18px,
      rgba(0,0,0,0.08) 20px
    );
  }

  /* Awning */
  .hp-awning {
    position: absolute;
    top: 18px;
    left: -4px;
    right: -4px;
    height: 24px;
    background: repeating-linear-gradient(
      90deg,
      #cc3333 0px,
      #cc3333 12px,
      #f0f0e0 12px,
      #f0f0e0 24px
    );
    border: 2px solid #aa2222;
    z-index: 3;
    clip-path: polygon(0 0, 100% 0, 96% 100%, 4% 100%);
  }

  /* Windows */
  .hp-window {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #2a1a00;
    border: 2px solid #5a3a08;
    box-shadow: 0 0 8px rgba(255,180,50,0.5), inset 0 0 6px rgba(255,180,50,0.3);
    z-index: 2;
    transition: box-shadow 0.3s ease;
  }
  .hp-window-l { top: 58px; left: 20px; }
  .hp-window-r { top: 58px; right: 20px; }
  .building-slot:hover .hp-window {
    box-shadow: 0 0 14px rgba(255,180,50,0.8), inset 0 0 8px rgba(255,180,50,0.5);
  }

  /* Door */
  .hp-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 28px;
    height: 40px;
    background: #4a2a10;
    border: 2px solid #3a1a00;
    border-bottom: none;
    z-index: 2;
    transition: box-shadow 0.3s ease;
  }
  .hp-door-knob {
    position: absolute;
    right: 4px;
    top: 50%;
    width: 4px;
    height: 4px;
    background: #c0a040;
    border-radius: 50%;
  }
  .building-slot:hover .hp-door {
    box-shadow: 0 0 10px rgba(255,180,50,0.5);
  }

  /* Open sign */
  .hp-open-sign {
    position: absolute;
    bottom: 14px;
    right: 14px;
    background: #1a1a2a;
    border: 1px solid #3a3a4a;
    padding: 2px 4px;
    z-index: 3;
  }
  .hp-open-sign span {
    color: #4CAF50;
    font-size: 0.35rem;
    font-family: 'Silkscreen', cursive;
  }

  /* Frying pan sprite - centered in building wall */
  .hp-sprite {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    width: 4px;
    height: 4px;
    background: transparent;
    filter: drop-shadow(0 0 5px rgba(255,150,50,0.5));
    box-shadow:
      /* Pan body (circle-ish) */
       0px  0px 0 0 #4a4a4a,
       4px  0px 0 0 #5a5a5a,
       8px  0px 0 0 #5a5a5a,
      12px  0px 0 0 #5a5a5a,
      16px  0px 0 0 #4a4a4a,
       -4px  4px 0 0 #4a4a4a,
       0px  4px 0 0 #5a5a5a,
       4px  4px 0 0 #6a6a6a,
       8px  4px 0 0 #6a6a6a,
      12px  4px 0 0 #6a6a6a,
      16px  4px 0 0 #5a5a5a,
      20px  4px 0 0 #4a4a4a,
       -4px  8px 0 0 #4a4a4a,
       0px  8px 0 0 #5a5a5a,
       4px  8px 0 0 #6a6a6a,
       8px  8px 0 0 #6a6a6a,
      12px  8px 0 0 #6a6a6a,
      16px  8px 0 0 #5a5a5a,
      20px  8px 0 0 #4a4a4a,
       0px 12px 0 0 #4a4a4a,
       4px 12px 0 0 #5a5a5a,
       8px 12px 0 0 #5a5a5a,
      12px 12px 0 0 #5a5a5a,
      16px 12px 0 0 #4a4a4a,
      /* Handle */
      24px  4px 0 0 #7a5a2a,
      28px  4px 0 0 #7a5a2a,
      32px  4px 0 0 #7a5a2a,
      36px  4px 0 0 #6a4a1a,
      24px  8px 0 0 #7a5a2a,
      28px  8px 0 0 #7a5a2a,
      32px  8px 0 0 #7a5a2a,
      36px  8px 0 0 #6a4a1a,
      /* Flame center */
       4px -4px 0 0 #ff6600,
       8px -4px 0 0 #ff8800,
      12px -4px 0 0 #ff6600,
       8px -8px 0 0 #ffaa00,
       4px -8px 0 0 #ff4400,
      12px -8px 0 0 #ff4400,
       8px -12px 0 0 #ff6600,
       8px -16px 0 0 #ff4400;
  }
  /* Glow background behind HP sprite */
  .hp-sprite-glow {
    position: absolute;
    top: 82px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 50px;
    background: radial-gradient(circle, rgba(255,180,50,0.12) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 4;
  }

  /* ======================== */
  /* BUILDING: RABBITS & HATS */
  /* ======================== */
  .building-rh {
    width: 160px;
    height: 200px;
    position: relative;
  }

  /* Turrets */
  .rh-turret {
    position: absolute;
    top: 0;
    width: 32px;
    height: 60px;
    z-index: 3;
  }
  .rh-turret-l { left: 8px; }
  .rh-turret-r { right: 8px; }

  .rh-turret-cap {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 24px solid #6a3a8a;
  }
  .rh-turret-body {
    position: absolute;
    top: 22px;
    left: 2px;
    right: 2px;
    bottom: 0;
    background: linear-gradient(135deg, #7a4a9a, #6a3a8a);
    border: 2px solid #4a2a6a;
  }

  /* Battlements */
  .rh-battlements {
    position: absolute;
    top: 36px;
    left: 40px;
    right: 40px;
    height: 16px;
    z-index: 2;
    display: flex;
  }
  .battlement {
    flex: 1;
    background: #6a3a8a;
    border: 1px solid #4a2a6a;
    margin: 0 1px;
  }
  .battlement:nth-child(even) {
    margin-top: 8px;
    height: 8px;
  }

  /* Main walls */
  .rh-walls {
    position: absolute;
    top: 50px;
    left: 12px;
    right: 12px;
    bottom: 0;
    background: linear-gradient(135deg, #7a4a9a 0%, #6a3a8a 50%, #5a2a7a 100%);
    border: 2px solid #4a2a6a;
    z-index: 1;
  }
  /* Stone texture */
  .rh-walls::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(
        0deg,
        transparent 0px,
        transparent 16px,
        rgba(0,0,0,0.05) 16px,
        rgba(0,0,0,0.05) 18px
      ),
      repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 24px,
        rgba(0,0,0,0.03) 24px,
        rgba(0,0,0,0.03) 26px
      );
  }

  /* Arched window */
  .rh-window {
    position: absolute;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 28px;
    background: #2a1a3a;
    border: 2px solid #4a2a6a;
    border-radius: 10px 10px 0 0;
    box-shadow: 0 0 8px rgba(160,100,200,0.3), inset 0 0 4px rgba(160,100,200,0.2);
    z-index: 2;
  }

  /* Door */
  .rh-door {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 36px;
    background: #3a1a4a;
    border: 2px solid #2a0a3a;
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    z-index: 2;
  }
  /* Lock */
  .rh-lock {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 6px;
    height: 8px;
    background: #8a7a5a;
    border-radius: 2px;
  }

  /* Construction tape */
  .rh-tape {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 16px;
    background: repeating-linear-gradient(
      -45deg,
      #f0c020 0px,
      #f0c020 6px,
      #2a2a2a 6px,
      #2a2a2a 12px
    );
    z-index: 3;
    opacity: 0.8;
  }

  /* Rabbit sprite - centered in building wall */
  .rh-sprite {
    position: absolute;
    top: 105px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    width: 4px;
    height: 4px;
    background: transparent;
    filter: drop-shadow(0 0 5px rgba(160,100,200,0.5));
    box-shadow:
      /* Hat brim */
      -12px 12px 0 0 #2a2a3a,
       -8px 12px 0 0 #2a2a3a,
       -4px 12px 0 0 #2a2a3a,
        0px 12px 0 0 #2a2a3a,
        4px 12px 0 0 #2a2a3a,
        8px 12px 0 0 #2a2a3a,
       12px 12px 0 0 #2a2a3a,
      /* Hat body */
       -4px  8px 0 0 #3a3a4a,
        0px  8px 0 0 #3a3a4a,
        4px  8px 0 0 #3a3a4a,
       -4px  4px 0 0 #3a3a4a,
        0px  4px 0 0 #3a3a4a,
        4px  4px 0 0 #3a3a4a,
       -4px  0px 0 0 #3a3a4a,
        0px  0px 0 0 #3a3a4a,
        4px  0px 0 0 #3a3a4a,
       -4px -4px 0 0 #4a4a5a,
        0px -4px 0 0 #4a4a5a,
        4px -4px 0 0 #4a4a5a,
      /* Hat band */
       -4px  8px 0 0 #c040a0,
        0px  8px 0 0 #c040a0,
        4px  8px 0 0 #c040a0,
      /* Rabbit ears */
       -4px -8px 0 0 #e0d0e0,
       -4px -12px 0 0 #e0d0e0,
       -4px -16px 0 0 #e0d0e0,
        4px -8px 0 0 #e0d0e0,
        4px -12px 0 0 #e0d0e0,
        4px -16px 0 0 #e0d0e0,
      /* Rabbit ear inner */
       -4px -12px 0 0 #d0a0c0,
        4px -12px 0 0 #d0a0c0,
      /* Rabbit head */
       -4px -4px 0 0 #e0d0e0,
        0px -4px 0 0 #e0d0e0,
        4px -4px 0 0 #e0d0e0,
       -4px -8px 0 0 #e0d0e0,
        0px -8px 0 0 #e0d0e0,
        4px -8px 0 0 #e0d0e0,
      /* Eyes */
       -4px -8px 0 0 #1a1a2a,
        4px -8px 0 0 #1a1a2a;
  }
  /* Glow background behind RH sprite */
  .rh-sprite-glow {
    position: absolute;
    top: 86px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, rgba(160,100,200,0.15) 0%, transparent 70%);
    border-radius: 50%;
    z-index: 4;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    z-index: 6;
  }
  .sparkle-1 {
    top: 20px;
    right: 10px;
    background: #d080e0;
    animation: sparkle 5s ease-in-out infinite;
  }
  .sparkle-2 {
    top: 40px;
    left: 12px;
    background: #e0a0f0;
    animation: sparkle 4s ease-in-out infinite 1.5s;
  }
  .sparkle-3 {
    top: 10px;
    left: 40px;
    background: #c060d0;
    animation: sparkle 6s ease-in-out infinite 3s;
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.8; transform: scale(1); }
  }

  /* --- FOOTER --- */
  .footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 8px;
    color: rgba(255,255,255,0.15);
    font-size: 0.4rem;
    font-family: 'Silkscreen', cursive;
  }

  /* --- HOVER SHADOW for live buildings --- */
  .building-slot:not(.disabled):hover .building-cf {
    filter: drop-shadow(0 4px 8px rgba(100,200,220,0.3));
  }
  .building-slot:not(.disabled):hover .building-hp {
    filter: drop-shadow(0 4px 8px rgba(255,180,50,0.3));
  }

  /* --- RESPONSIVE --- */
  @media (max-width: 900px) {
    .village {
      gap: 30px;
      padding: 0 20px;
    }
    .building-cf, .building-rh { transform: scale(0.85); }
    .building-hp { transform: scale(0.9); }
    .header h1 { font-size: 1.8rem; }
  }

  @media (max-width: 600px) {
    .village {
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding-bottom: 40px;
    }
    .header h1 { font-size: 1.4rem; }
    .header .subtitle { font-size: 0.7rem; }
    .building-cf, .building-hp, .building-rh {
      transform: scale(1);
    }
  }
</style>
</head>

<script>
  // Generate twinkling stars
  (function() {
    var sky = document.getElementById('sky');
    var count = 40;
    for (var i = 0; i < count; i++) {
      var star = document.createElement('div');
      star.className = 'star';
      star.style.left = (Math.random() * 100) + '%';
      star.style.top = (Math.random() * 85) + '%';
      star.style.setProperty('--dur', (4 + Math.random() * 3) + 's');
      star.style.setProperty('--delay', (Math.random() * 7) + 's');
      sky.appendChild(star);
    }
  })();
</script>
