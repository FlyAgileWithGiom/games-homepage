stages:
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  IMAGE_NAME: games-homepage
  NAMESPACE_NAME: games-homepage
  REGION: fr-par
  MEMORY_LIMIT: 128

deploy-production:
  stage: deploy
  image: docker:24
  services:
    - docker:24-dind
  only:
    - tags
  before_script:
    - apk add --no-cache curl jq bash
    # Install Scaleway CLI (same version as cold-chamber-react)
    - |
      ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
      SCW_VERSION="2.43.0"
      curl -o /usr/local/bin/scw -L "https://github.com/scaleway/scaleway-cli/releases/download/v${SCW_VERSION}/scaleway-cli_${SCW_VERSION}_linux_${ARCH}"
      chmod +x /usr/local/bin/scw
      scw version

    # Configure Scaleway CLI
    - export SCW_ACCESS_KEY=${SCW_ACCESS_KEY}
    - export SCW_SECRET_KEY=${SCW_SECRET_KEY}
    - export SCW_DEFAULT_ORGANIZATION_ID=${SCW_DEFAULT_ORGANIZATION_ID}
    - export SCW_DEFAULT_PROJECT_ID=${SCW_DEFAULT_PROJECT_ID}
  script:
    # Create or get container namespace
    - |
      scw container namespace create \
        name=${NAMESPACE_NAME} \
        region=${REGION} \
        project-id=${SCW_DEFAULT_PROJECT_ID} 2>/dev/null || \
      echo "Container namespace already exists"

    # Get container namespace info
    - CONTAINER_INFO=$(scw container namespace list region=${REGION} -o json | jq -r ".[] | select(.name==\"${NAMESPACE_NAME}\")")
    - CONTAINER_NAMESPACE_ID=$(echo "$CONTAINER_INFO" | jq -r ".id")
    - REGISTRY_ENDPOINT=$(echo "$CONTAINER_INFO" | jq -r ".registry_endpoint")
    - echo "Container namespace ID:${CONTAINER_NAMESPACE_ID}"
    - echo "Registry endpoint:${REGISTRY_ENDPOINT}"

    # Build Docker image
    - docker build -t ${IMAGE_NAME}:${CI_COMMIT_TAG} -t ${IMAGE_NAME}:latest .

    # Login and push to Scaleway registry
    - echo ${SCW_SECRET_KEY} | docker login rg.fr-par.scw.cloud -u nologin --password-stdin
    - docker tag ${IMAGE_NAME}:latest ${REGISTRY_ENDPOINT}/${IMAGE_NAME}:latest
    - docker tag ${IMAGE_NAME}:${CI_COMMIT_TAG} ${REGISTRY_ENDPOINT}/${IMAGE_NAME}:${CI_COMMIT_TAG}
    - docker push ${REGISTRY_ENDPOINT}/${IMAGE_NAME}:latest
    - docker push ${REGISTRY_ENDPOINT}/${IMAGE_NAME}:${CI_COMMIT_TAG}

    # Deploy or update container
    - |
      CONTAINER_ID=$(scw container container list namespace-id=${CONTAINER_NAMESPACE_ID} region=${REGION} -o json | jq -r ".[] | select(.name==\"${IMAGE_NAME}\") | .id")

      if [ -z "$CONTAINER_ID" ]; then
        echo "Creating new container..."
        scw container container create \
          namespace-id=${CONTAINER_NAMESPACE_ID} \
          name=${IMAGE_NAME} \
          registry-image=${REGISTRY_ENDPOINT}/${IMAGE_NAME}:latest \
          port=80 \
          min-scale=0 \
          max-scale=5 \
          memory-limit=${MEMORY_LIMIT} \
          region=${REGION}
      else
        echo "Updating existing container..."
        scw container container update \
          container-id=${CONTAINER_ID} \
          registry-image=${REGISTRY_ENDPOINT}/${IMAGE_NAME}:latest \
          region=${REGION}
      fi

    # Get deployment URL
    - CONTAINER_INFO=$(scw container container list namespace-id=${CONTAINER_NAMESPACE_ID} region=${REGION} -o json | jq -r ".[] | select(.name==\"${IMAGE_NAME}\")")
    - DOMAIN_NAME=$(echo "$CONTAINER_INFO" | jq -r ".domain_name")
    - echo "Deployment complete for tag ${CI_COMMIT_TAG}"
    - echo "App URL:https://${DOMAIN_NAME}"
  environment:
    name: production
