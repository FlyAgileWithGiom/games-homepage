stages:
  - docker-build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  REGISTRY: rg.fr-par.scw.cloud
  IMAGE: rg.fr-par.scw.cloud/fly-agile-prod/games-homepage

# Build Docker image and push to Scaleway registry
docker-build:
  stage: docker-build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - echo ${SCW_SECRET_KEY} | docker login ${REGISTRY} -u nologin --password-stdin
  script:
    - |
      TAGS="-t ${IMAGE}:sha-${CI_COMMIT_SHA}"
      if [ -n "${CI_COMMIT_TAG}" ]; then
        TAGS="${TAGS} -t ${IMAGE}:${CI_COMMIT_TAG} -t ${IMAGE}:latest"
      fi
      docker build ${TAGS} .
      docker push ${IMAGE} --all-tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/

# Trigger K8s manifest update via GitHub Actions workflow_dispatch
update-k8s-manifest:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
  script:
    - |
      HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
        -H "Accept: application/vnd.github.v3+json" \
        -H "Authorization: token ${GITHUB_PAT}" \
        https://api.github.com/repos/FlyAgileWithGiom/mcp-infra-platform/actions/workflows/update-image-tag.yml/dispatches \
        -d "{
          \"ref\": \"main\",
          \"inputs\": {
            \"service_name\": \"games-homepage\",
            \"image_tag\": \"sha-${CI_COMMIT_SHA}\",
            \"kustomize_path\": \"apps/games-homepage/base\"
          }
        }")
      echo "GitHub API response: ${HTTP_STATUS}"
      if [ "${HTTP_STATUS}" != "204" ]; then
        echo "Failed to trigger GitHub workflow (expected 204, got ${HTTP_STATUS})"
        exit 1
      fi
      echo "Successfully triggered K8s manifest update for sha-${CI_COMMIT_SHA}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v/
  needs:
    - docker-build
